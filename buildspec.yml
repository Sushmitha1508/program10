version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 301764001046.dkr.ecr.ap-south-1.amazonaws.com
  build:
    commands:
      - echo Building Docker image...
      - docker build -t 301764001046.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest .
  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push 301764001046.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest
      - printf '[{"name":"my-app","imageUri":"%s"}]' 301764001046.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest > imagedefinitions.json
artifacts:
  files: imagedefinitions.json